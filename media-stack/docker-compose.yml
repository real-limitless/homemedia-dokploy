version: "3.9"

services:
  # ====================== RCLONE FUSE MOUNT (S3) ======================
  rclone-media:
    image: rclone/rclone:latest
    container_name: rclone-media
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    environment:
      - RCLONE_REMOTE_NAME=${RCLONE_REMOTE_NAME:-private-s3}
      - RCLONE_ACCESS_KEY=${RCLONE_ACCESS_KEY}
      - RCLONE_SECRET_KEY=${RCLONE_SECRET_KEY}
      - RCLONE_ENDPOINT=${RCLONE_ENDPOINT}
      - RCLONE_BUCKET=${RCLONE_BUCKET}
      - RCLONE_REGION=${RCLONE_REGION:-other-v2-signature}
      - RCLONE_VFS_CACHE_MAX_SIZE=${RCLONE_VFS_CACHE_MAX_SIZE:-80G}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./rclone-cache:/cache
      - /mnt/s3-media:/mnt/media:shared
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        fusermount -uz /mnt/media 2>/dev/null || umount -l /mnt/media 2>/dev/null || true
        mkdir -p /config
        cat > /config/rclone.conf <<EOF
        [${RCLONE_REMOTE_NAME:-private-s3}]
        type = s3
        provider = Minio
        access_key_id = ${RCLONE_ACCESS_KEY}
        secret_access_key = ${RCLONE_SECRET_KEY}
        endpoint = ${RCLONE_ENDPOINT}
        bucket = ${RCLONE_BUCKET}
        sign_accept_encoding = false
        EOF
        rclone mount ${RCLONE_REMOTE_NAME:-private-s3}: /mnt/media \
          --config=/config/rclone.conf \
          --vfs-cache-mode=full \
          --vfs-cache-max-size=${RCLONE_VFS_CACHE_MAX_SIZE:-80G} \
          --s3-sign-accept-encoding=false \
          --s3-region=${RCLONE_REGION:-other-v2-signature} \
          --vfs-cache-max-age=336h \
          --vfs-read-ahead=512M \
          --dir-cache-time=9999h \
          --poll-interval=1m \
          --allow-other \
          --uid=${PUID:-1000} \
          --gid=${PGID:-1000} \
          --cache-dir=/cache \
          --allow-non-empty
    healthcheck:
      test: ["CMD-SHELL", "mountpoint -q /mnt/media || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ====================== VPN + TORRENT CLIENT ======================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
      - VPN_TYPE=${VPN_TYPE}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_REGIONS=${SERVER_REGIONS}
      # ← add any extra gluetun env vars from your .env here

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    restart: unless-stopped
    ports: 
      - 8080:8080 
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./qbittorrent/config:/config
      - ./downloads:/downloads

  # ====================== *ARR STACK ======================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./prowlarr/config:/config
      - /mnt/s3-media:/media

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./radarr/config:/config
      - /mnt/s3-media:/media

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./sonarr/config:/config
      - /mnt/s3-media:/media

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./lidarr/config:/config
      - /mnt/s3-media:/media

  readarr:
    image:  linuxserver/readarr:0.4.19-nightly
    container_name: readarr
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./readarr/config:/config
      - /mnt/s3-media:/media

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./bazarr/config:/config
      - /mnt/s3-media:/media

  # ====================== MEDIA SERVERS ======================
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./plex/config:/config
      - /mnt/s3-media:/media

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./jellyfin/config:/config
      - /mnt/s3-media:/media

  # ====================== SUPPORT SERVICES ======================
  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ./overseerr/config:/app/config

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./tautulli/config:/config

  tdarr:
    image:  ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    depends_on:
      rclone-media:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./tdarr/config:/app/config
      - /mnt/s3-media:/media

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
